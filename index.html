<!DOCTYPE html>
<html>
<head>
    <title>Simulação de Probabilidade</title>
    <style>
      #container {
        display: flex;
        flex-wrap: wrap;
        width: 400px;
        margin: auto;
        }

      .bola {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: blue;
        margin: 2px;
      }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        #resultado {
            font-size: 80px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="resultado">0</div>
<div id="container"></div>
<div id="resultado">0</div>
    <script>
    const probabilidade = 0.03; // exemplo: 3%
    let contador = 0;

    for (let i = 0; i < 1000; i++) {
        let r = Math.random();

        if (r < probabilidade) {
            contador++;
        }
    }
    // mostrar resultado
    document.getElementById("resultado").textContent = contador;
    const container = document.getElementById("container");
    // criar bolas
    for (let i = 0; i < contador; i++) {
        const bola = document.createElement("div");
        bola.classList.add("bola");
        container.appendChild(bola);
}
</script>
</script>

</body>
</html>
